name: Ubuntu x64 Cloud Compiler

on:
  push:
  pull_request:
  workflow_dispatch: # Allows you to trigger a build manually in the GitHub UI!

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v5
    
    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-start=$EPOCHSECONDS" >> "$GITHUB_OUTPUT"
        echo "build-output-dir=${{ github.workspace }}/bin" >> "$GITHUB_OUTPUT"
        
    - name: Dependencies
      run: |
        sudo apt-get update && sudo apt-get install -yq ccache libboost-dev libboost-filesystem-dev libboost-locale-dev libboost-program-options-dev libboost-regex-dev libboost-thread-dev libssl-dev libreadline-dev zlib1g-dev libbz2-dev ninja-build
        
    - name: Restore CCache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ubuntu-clang17-ccache-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ubuntu-clang17-ccache-${{ github.ref_name }}-
          ubuntu-clang17-ccache-
          
    - name: Setup CMake
      env:
        CC: clang-17
        CXX: clang++-17
      run: >
        cmake -GNinja -S ${{ github.workspace }} -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        -DTOOLS=0
        -DWITH_WARNINGS=0
        -DSERVERS=1
        -DCMAKE_INSTALL_PREFIX=server_install
        
    - name: Compile
      env:
        CCACHE_BASEDIR: ${{ github.workspace }}
        CCACHE_DIR: ${{ github.workspace }}/.ccache
      run: |
        ccache -z
        cmake --build ${{ steps.strings.outputs.build-output-dir }}
        ccache -s
        ccache --evict-older-than $(($EPOCHSECONDS - ${{ steps.strings.outputs.build-start }}))s
        
    - name: Prepare Binaries
      run: |
        cmake --install ${{ steps.strings.outputs.build-output-dir }}
        
    - name: Upload Server Artifacts
      uses: actions/upload-artifact@v4
      with:
        path: |
          ${{ github.workspace }}/server_install/bin
          ${{ github.workspace }}/server_install/etc
        name: TrinityCore-Linux-Binaries
        retention-days: 7
